<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - QuizLingo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4A90E2',
                        secondary: '#50C878',
                        accent: '#FFA500',
                        background: '#f8f9fa',
                    },
                    fontFamily: {
                        sans: ['Arial', 'sans-serif'],
                    },
                },
            },
        };
    </script>
</head>
<body class="bg-background text-gray-800 font-sans">
    <header class="bg-primary text-white">
        <nav class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="new quiz.html" class="text-2xl font-bold flex items-center">
                <img src="c:\Users\acer\Downloads\WhatsApp Image 2024-09-23 at 09.48.41.jpeg" alt="Logo" class="mr-2 h-14 w-15">
                QuizLingo
            </a>
            <ul class="flex space-x-4">
                <li><a href="new quiz.html" class="hover:text-accent">Home</a></li>
                <li><a href="about us.html" class="hover:text-accent">About</a></li>
                <li><a href="contact.html" class="hover:text-accent">Contact</a></li>
                <li><a href="login page.html" class="hover:text-accent">Log In</a></li>
            </ul>
        </nav>
    </header>


    <section class="min-h-screen flex items-center justify-center bg-gradient-to-r from-primary to-secondary">
        <div class="bg-white rounded-lg shadow-lg p-8 w-full max-w-3xl">
            <h1 class="text-3xl font-bold text-center text-primary mb-6">Get in Touch</h1>
            <p class="text-center text-gray-600 mb-8">We'd love to hear from you. Send us a message below.</p>
            <form>
   
                <div class="mb-4">
                    <label for="name" class="block text-gray-700 font-bold mb-2">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name"
                        class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                </div>

                <div class="mb-4">
                    <label for="email" class="block text-gray-700 font-bold mb-2">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email"
                        class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                </div>

                <div class="mb-4">
                    <label for="subject" class="block text-gray-700 font-bold mb-2">Subject</label>
                    <input type="text" id="subject" name="subject" placeholder="Enter the subject"
                        class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                </div>

                <div class="mb-4">
                    <label for="message" class="block text-gray-700 font-bold mb-2">Message</label>
                    <textarea id="message" name="message" rows="5" placeholder="Write your message"
                        class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary"></textarea>
                </div>

                <button type="submit"
                    class="w-full bg-primary text-white py-3 rounded-lg font-bold hover:bg-opacity-90 transition duration-300">
                    Send Message
                </button>
            </form>

            <div class="text-center text-gray-600 mt-6">
                <p>Email: <a href="mailto:support@QuizLingo.com" class="text-primary hover:underline">support@QuizLingo.com</a></p>
                <p>Phone: <a href="tel:+919646046189" class="text-primary hover:underline">+919646046189</a></p>
            </div>
        </div>
    </section>

</body>
</html>
