<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - QuizLingo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4A90E2',
                        secondary: '#50C878',
                        accent: '#FFA500',
                        background: '#f8f9fa',
                    },
                    fontFamily: {
                        sans: ['Arial', 'sans-serif'],
                    },
                },
            },
        };
    </script>
</head>
<body class="bg-background text-gray-800 font-sans">
  
    <header class="bg-primary text-white">
        <nav class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="new quiz.html" class="text-2xl font-bold flex items-center">
                <img src="c:\Users\acer\Downloads\WhatsApp Image 2024-09-23 at 09.48.41.jpeg" alt="Logo" class="mr-2 h-14 w-15">
                QuizLingo
            </a>
            <ul class="flex space-x-4">
                <li><a href="index.html" class="hover:text-accent">Home</a></li>
                <li><a href="about us.html" class="hover:text-accent">About</a></li>
                <li><a href="contact us.html" class="hover:text-accent">Contact</a></li>
                <li><a href="login page.html" class="hover:text-accent">Log In</a></li>
            </ul>
        </nav>
    </header>

 
    <section class="min-h-screen flex items-center justify-center bg-gradient-to-r from-primary to-secondary">
        <div class="bg-white rounded-lg shadow-lg p-8 w-full max-w-md">
            <h1 class="text-3xl font-bold text-center text-primary mb-6">Welcome Back!</h1>
            <p class="text-center text-gray-600 mb-8">Log in to your QuizLingo account to continue learning.</p>
            <form>
           
                <div class="mb-4">
                    <label for="email" class="block text-gray-700 font-bold mb-2">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email"
                        class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                </div>

      
                <div class="mb-4">
                    <label for="password" class="block text-gray-700 font-bold mb-2">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password"
                        class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                </div>

                <div class="flex items-center justify-between mb-4">
                    <label class="inline-flex items-center">
                        <input type="checkbox" class="form-checkbox text-primary">
                        <span class="ml-2 text-gray-600">Remember Me</span>
                    </label>
                </div>

                <a href="new quiz.html" 
                class="w-full block text-center bg-primary text-white py-3 rounded-lg font-bold hover:bg-opacity-90 transition duration-300">
                Log In
            </a>
            </form>

            <p class="text-center text-gray-600 mt-6">
                Don't have an account? <a href="sign up.html" class="text-accent hover:underline">Sign Up</a>
            </p>
        </div>
    </section>
</body>
</html>
